<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Receipt | Velora</title>
<link rel="stylesheet" href="../src/output.css">
</head>

<body class="bg-[#F5F2EB] min-h-screen flex items-center justify-center">

<div class="max-w-2xl w-full bg-white shadow-2xl rounded-2xl overflow-hidden">

    <!-- HEADER -->
    <div class="bg-[#1E1A17] text-white p-6 text-center">
        <h1 class="text-2xl font-bold">VELORA</h1>
        <p class="text-sm text-gray-300">Order Receipt</p>
    </div>

    <!-- CONTENT -->
    <div class="p-6">

        <div class="flex justify-between text-sm text-gray-600 mb-4">
            <p>Order ID: <span id="orderId"></span></p>
            <p id="orderDate"></p>
        </div>

        <hr class="my-4">

        <!-- ITEMS -->
        <div id="items" class="space-y-3"></div>

        <hr class="my-4">

        <!-- TOTAL -->
        <div class="flex justify-between font-bold text-lg">
            <span>Total Paid</span>
            <span id="total"></span>
        </div>

        <p class="text-center text-gray-500 text-sm mt-6">
            Thank you for shopping with Velora 💛
        </p>

    </div>

</div>

<script>
function loadReceipt() {

    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    let lastOrder = orders[orders.length - 1];

    if (!lastOrder) return;

    document.getElementById("orderId").innerText = lastOrder.id;
    document.getElementById("orderDate").innerText = lastOrder.date;

    let container = document.getElementById("items");

    let total = 0;

    lastOrder.items.forEach(item => {

        let qty = item.quantity || 1;
        let itemTotal = item.price * qty;

        total += itemTotal;

        container.innerHTML += `
            <div class="flex justify-between text-sm">
                <span>${item.name} × ${qty}</span>
                <span>₹${itemTotal}</span>
            </div>
        `;
    });

    document.getElementById("total").innerText = "₹" + total;
}

loadReceipt();
</script>

</body>
</html>
