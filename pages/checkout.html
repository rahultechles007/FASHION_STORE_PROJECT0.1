<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Velora</title>
    <link rel="stylesheet" href="../src/output.css">
</head>

<body class="bg-[#F5F2EB]">

<!-- CHECKOUT WRAPPER -->
<div class="max-w-5xl mx-auto px-4 py-10">

    <h1 class="text-3xl font-bold text-center mb-8">
        Checkout
    </h1>

    <div class="grid md:grid-cols-2 gap-6">

        <!-- LEFT: USER DETAILS -->
        <div class="bg-white p-6 rounded-2xl shadow">

            <h2 class="text-xl font-semibold mb-4">
                Billing Details
            </h2>

            <input type="text" placeholder="Full Name"
                class="w-full mb-3 border rounded-xl px-4 py-2">

            <input type="text" placeholder="Phone Number"
                class="w-full mb-3 border rounded-xl px-4 py-2">

            <input type="text" placeholder="Address"
                class="w-full mb-3 border rounded-xl px-4 py-2">

            <input type="text" placeholder="City"
                class="w-full mb-3 border rounded-xl px-4 py-2">

        </div>

        <!-- RIGHT: ORDER SUMMARY -->
        <div class="bg-white p-6 rounded-2xl shadow">

            <h2 class="text-xl font-semibold mb-4">
                Order Summary
            </h2>

            <!-- IMPORTANT: ONLY ONE ORDER SUMMARY -->
            <div id="orderSummary" class="space-y-3"></div>

            <hr class="my-4">

            <h3 class="text-xl font-bold">
                Total: ₹<span id="totalAmount">0</span>
            </h3>

            <button
                onclick="placeOrder()"
                class="w-full mt-5 bg-[#1E1A17] text-white py-3 rounded-xl hover:bg-[#C8A96B] transition">
                Place Order
            </button>

        </div>

    </div>

</div>

<!-- LOGIN CHECK -->
<script>
let user = JSON.parse(localStorage.getItem("currentUser"));

if (!user) {
    window.location.href = "./login.html";
}
</script>

<!-- CHECKOUT LOGIC -->
<script src="../assets/js/checkout.js"></script>

</body>
</html>
