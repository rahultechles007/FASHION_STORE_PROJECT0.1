<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Velora</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="../src/output.css">
</head>

<body class="bg-[#F5F2EB] text-[#1E1A17]">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 md:px-6">

            <div class="flex items-center justify-between h-20">

                <!-- Logo -->
                <a href="../index.html" class="flex items-center gap-2 text-3xl font-bold">
                    <i class="fa-solid fa-gem text-[#C8A96B]"></i>
                    <span>
                        VE<span class="text-[#C8A96B]">L</span>ORA
                    </span>
                </a>

                <!-- Desktop Search -->
                <div class="hidden md:flex flex-1 max-w-xl mx-10">
                    <input id="searchInput" type="text" placeholder="Search products..."
                        class="w-full border border-gray-300 rounded-l-xl px-4 py-2 focus:outline-none">

                    <button class="bg-[#C8A96B] text-white px-5 rounded-r-xl">
                        Search
                    </button>
                </div>

                <!-- Right Icons -->
                <div class="flex items-center gap-5">

                    <a href="./wishlist.html" class="relative">
                        <i class="fa-regular fa-heart text-xl"></i>

                        <span id="wishlistCount"
                            class="absolute -top-2 -right-2 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">
                            0
                        </span>
                    </a>

                    <a href="./cart.html" class="relative">
                        <i class="fa-solid fa-cart-shopping text-xl"></i>

                        <span id="cartCount"
                            class="absolute -top-2 -right-2 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">
                            0
                        </span>
                    </a>

                    <a href="./profile.html">
                        <i class="fa-solid fa-user text-xl"></i>
                    </a>

                </div>

            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="py-12 lg:py-16">
        <div class="max-w-7xl mx-auto px-4 text-center">

            <span class="text-[#C8A96B] uppercase tracking-[4px]">
                Velora Collection
            </span>

            <h1 class="text-4xl lg:text-6xl font-bold mt-4">
                Fashion Collection
            </h1>

            <p class="text-gray-500 mt-4 max-w-2xl mx-auto">
                Explore premium fashion pieces designed for modern elegance,
                comfort and timeless style.
            </p>

        </div>
    </section>

    <!-- CATEGORY FILTER -->
    <section class="mb-8">
        <div class="flex flex-wrap justify-center gap-3 px-4">

            <button class="filter-btn bg-[#1E1A17] text-white px-5 py-2 rounded-full">
                All
            </button>

            <button class="filter-btn bg-white border px-5 py-2 rounded-full">
                Traditional
            </button>

            <button class="filter-btn bg-white border px-5 py-2 rounded-full">
                Western
            </button>

            <button class="filter-btn bg-white border px-5 py-2 rounded-full">
                Footwear
            </button>

            <button class="filter-btn bg-white border px-5 py-2 rounded-full">
                Accessories
            </button>

        </div>
    </section>

    <!-- PRODUCTS -->
    <section class="pb-24">
        <div id="productGrid"
            class="max-w-7xl mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        </div>
    </section>

    <!-- MOBILE BOTTOM NAV -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg flex justify-around py-3 md:hidden z-50">

        <a href="../index.html">
            <i class="fa-solid fa-house"></i>
        </a>

        <a href="./shop.html">
            <i class="fa-solid fa-bag-shopping"></i>
        </a>

        <a href="./cart.html" class="relative">
            <i class="fa-solid fa-cart-shopping"></i>

            <span id="cartCount"
                class="absolute -top-2 -right-2 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center">
                0
            </span>
        </a>

        <a href="./wishlist.html">
            <i class="fa-regular fa-heart"></i>
        </a>

        <a href="./profile.html">
            <i class="fa-solid fa-user"></i>
        </a>

    </div>

    <script src="../assets/js/shop.js"></script>
    <script src="../assets/js/cart.js"></script>
    <script src="../assets/js/wishlist.js"></script>

    

</body>

</html>
