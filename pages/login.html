<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Velora</title>

    <link rel="stylesheet" href="../src/output.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn .8s ease;
        }

        body {
            background:
                radial-gradient(circle at top right,
                    rgba(200, 169, 107, .15),
                    transparent 30%),
                radial-gradient(circle at bottom left,
                    rgba(200, 169, 107, .15),
                    transparent 30%),
                #F5F2EB;
        }
    </style>
</head>

<body>

    <div class="min-h-screen flex items-center justify-center px-4 py-10">

        <div
            class="fade-in bg-white rounded-3xl shadow-2xl border border-[#E8E2D5] w-full max-w-md p-8 md:p-10">

            <!-- Logo -->
            <div class="text-center mb-8">

                <div
                    class="w-20 h-20 mx-auto mb-5 rounded-full bg-[#C8A96B]/20 flex items-center justify-center">

                    <i class="fa-solid fa-gem text-[#C8A96B] text-3xl"></i>

                </div>

                <a href="../index.html"
                    class="text-4xl font-bold tracking-widest inline-block">

                    VE<span class="text-[#C8A96B]">L</span>ORA

                </a>

                <p class="text-gray-500 mt-3">
                    Welcome back to your fashion destination
                </p>

            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-5">

                <!-- Email -->
                <div>

                    <label class="block text-sm font-medium mb-2">
                        Email Address
                    </label>

                    <div class="relative">

                        <i
                            class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

                        <input
                            type="email"
                            id="loginEmail"
                            placeholder="Enter your email"
                            required
                            class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#C8A96B] focus:outline-none">

                    </div>

                </div>

                <!-- Password -->
                <div>

                    <label class="block text-sm font-medium mb-2">
                        Password
                    </label>

                    <div class="relative">

                        <i
                            class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>

                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="Enter your password"
                            required
                            class="w-full pl-11 pr-12 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#C8A96B] focus:outline-none">

                        <button
                            type="button"
                            onclick="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2">

                            <i id="eyeIcon"
                                class="fa-solid fa-eye text-gray-500"></i>

                        </button>

                    </div>

                </div>

                <!-- Remember -->
                <div class="flex justify-between items-center text-sm">

                    <label class="flex items-center gap-2">

                        <input
                            type="checkbox"
                            class="accent-[#C8A96B]">

                        Remember Me

                    </label>

                    <a href="#"
                        class="text-[#C8A96B] hover:underline">
                        Forgot Password?
                    </a>

                </div>

                <!-- Login -->
                <button
                    type="button"
                    onclick="loginuser()"
                    class="w-full bg-[#1E1A17] text-white py-3 rounded-xl font-semibold hover:bg-[#C8A96B] hover:text-black transition-all">

                    Login

                </button>

            </form>

            <!-- Divider -->
            <div class="flex items-center my-6">

                <div class="flex-1 border-t"></div>

                <span class="px-4 text-gray-400 text-sm">
                    OR
                </span>

                <div class="flex-1 border-t"></div>

            </div>

            <!-- Social -->
            <div class="grid grid-cols-2 gap-3">

                <button
                    class="border py-3 rounded-xl hover:bg-gray-100 transition">

                    <i class="fa-brands fa-google mr-2"></i>
                    Google

                </button>

                <button
                    class="border py-3 rounded-xl hover:bg-gray-100 transition">

                    <i class="fa-brands fa-facebook-f mr-2"></i>
                    Facebook

                </button>

            </div>

            <!-- Register -->
            <p class="text-center text-sm text-gray-500 mt-8">

                Don't have an account?

                <a href="./register.html"
                    class="text-[#C8A96B] font-semibold hover:underline">

                    Register

                </a>

            </p>

        </div>

    </div>

    <script>
        function togglePassword() {

            const password =
                document.getElementById("loginPassword");

            const eye =
                document.getElementById("eyeIcon");

            if (password.type === "password") {

                password.type = "text";

                eye.classList.replace(
                    "fa-eye",
                    "fa-eye-slash"
                );

            } else {

                password.type = "password";

                eye.classList.replace(
                    "fa-eye-slash",
                    "fa-eye"
                );
            }
        }
    </script>

    <script src="../assets/js/auth.js"></script>

</body>

</html>l>
