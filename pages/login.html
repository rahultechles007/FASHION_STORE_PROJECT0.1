<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Velora</title>

<link rel="stylesheet" href="../src/output.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    background:
      radial-gradient(circle at top right, rgba(200, 169, 107, 0.15), transparent 30%),
      radial-gradient(circle at bottom left, rgba(200, 169, 107, 0.15), transparent 30%),
      #F5F2EB;
  }

  /* Fade-in animation for the card */
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .fade-in {
    animation: fadeIn 0.8s ease;
  }

</style>

</head>

<body>

<div class="min-h-screen flex items-center justify-center px-4 py-10">

<div class="max-w-md w-full bg-white rounded-3xl border border-gray-200 shadow-xl p-8 fade-in">

<!-- LOGO -->

<div class="text-center mb-8">

<div class="w-20 h-20 mx-auto mb-4 rounded-full bg-[#C8A96B]/20 flex items-center justify-center">

<i class="fa-solid fa-gem text-[#C8A96B] text-3xl"></i>

</div>

<a href="../index.html"
class="text-4xl font-bold tracking-widest text-gray-800">

VE<span class="text-[#C8A96B]">L</span>ORA

</a>

<p class="mt-4 text-gray-500 text-center">
Welcome back to your fashion destination
</p>

</div>

<!-- LOGIN FORM -->

<form id="loginForm" class="space-y-6">

<!-- EMAIL -->

<div>

<label class="block mb-2 font-medium text-gray-700">
Email Address
</label>

<input
type="email"
id="loginEmail"
placeholder="Enter your email"
class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#C8A96B]"
required
autocomplete="off">

</div>

<!-- PASSWORD -->

<div>

<label class="block mb-2 font-medium text-gray-700">
Password
</label>

<div class="relative">

<input
type="password"
id="loginPassword"
placeholder="Enter your password"
class="w-full border border-gray-300 rounded-xl px-4 py-3 pr-12 focus:outline-none focus:ring-2 focus:ring-[#C8A96B]"
required
autocomplete="new-password">

<button
type="button"
onclick="togglePassword()"
class="absolute right-4 top-1/2 -translate-y-1/2 focus:outline-none">

<i
id="eyeIcon"
class="fa-solid fa-eye text-gray-500"></i>

</button>

</div>

</div>

<!-- OPTIONS -->

<div class="flex justify-between items-center text-sm">

<label class="flex items-center gap-2">

<input
type="checkbox"
class="accent-[#d6b062]">

Remember Me

</label>

<a
href="javascript:void(0)"
onclick="openForgotModal()"
class="text-[#C8A96B] font-medium hover:underline">

Forgot Password?

</a>

</div>

<!-- LOGIN BUTTON -->

<button
type="button"
onclick="loginuser()"
class="w-full bg-[#1E1A17] text-white py-3 rounded-xl font-semibold hover:bg-[#C8A96B] hover:text-black transition">

Login

</button>

</form>

<!-- DIVIDER -->

<div class="flex items-center my-6">

<div class="flex-1 border-t border-gray-300"></div>

<span class="px-4 text-gray-400 text-sm">
OR
</span>

<div class=" flex-1 border-t border-gray-300"></div>

</div>

<!-- SOCIAL LOGIN -->

<div class="grid grid-cols-2 gap-3 mb-6">

<button
type="button"
class="border border-gray-300 py-3 rounded-xl flex items-center justify-center hover:bg-gray-100">

<i class="fa-brands fa-google mr-2"></i>
Google

</button>

<button
type="button"
class="border py-3 rounded-xl hover:bg-gray-100">

<i class="fa-brands fa-facebook-f mr-2"></i>
Facebook

</button>

</div>

<!-- REGISTER -->

<p class="text-center mt-8 text-gray-500 text-sm">

Don't have an account?

<a
href="./register.html"
class="text-[#C8A96B] font-semibold hover:underline">

Register

</a>

</p>

</div>

</div>

<!-- FORGOT PASSWORD MODAL -->

<div
id="forgotModal"
class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">

<div
class="bg-white w-[90%] max-w-md rounded-3xl p-6 shadow-xl">

<h2 class="text-2xl font-bold mb-2">
Reset Password
</h2>

<p class="text-gray-500 text-sm mb-4">
Enter your registered email
</p>

<input
type="email"
id="resetEmail"
placeholder="Email"
class="w-full border  border-gray-300 rounded-xl px-4 py-3 mb-4">

<input
type="password"
id="newPassword"
placeholder="New Password"
class="w-full border  border-gray-300 rounded-xl px-4 py-3 mb-4">

<div class="flex gap-3">

<button
onclick="resetPassword()"
class="flex-1 bg-[#1E1A17] text-white py-3 rounded-xl">

Update

</button>

<button
onclick="closeForgotModal()"
class="flex-1 bg-gray-200 py-3 rounded-xl">

Cancel

</button>

</div>

</div>

</div>

<script>

function togglePassword(){

const password =
document.getElementById("loginPassword");

const eye =
document.getElementById("eyeIcon");

if(password.type==="password"){

password.type="text";

eye.classList.replace(
"fa-eye",
"fa-eye-slash"
);

}else{

password.type="password";

eye.classList.replace(
"fa-eye-slash",
"fa-eye"
);
}
}

function openForgotModal(){

document
.getElementById("forgotModal")
.classList.remove("hidden");

document
.getElementById("forgotModal")
.classList.add("flex");
}

function closeForgotModal(){

document
.getElementById("forgotModal")
.classList.add("hidden");

document
.getElementById("forgotModal")
.classList.remove("flex");
}

function resetPassword(){

let email =
document.getElementById("resetEmail")
.value.trim()
.toLowerCase();

let newPassword =
document.getElementById("newPassword")
.value;

let users =
JSON.parse(
localStorage.getItem("users")
) || [];

let user =
users.find(
u => u.email.toLowerCase() === email
);

if(!user){

alert("User not found");
return;
}

user.password = newPassword;

localStorage.setItem(
"users",
JSON.stringify(users)
);

alert("Password Updated Successfully");

closeForgotModal();
}

</script>

<script src="../assets/js/auth.js"></script>

</body>
</html>
