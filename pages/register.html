<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Velora</title>

    <link rel="stylesheet" href="../src/output.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatCard {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .fade-in {
            animation: fadeIn 0.8s ease;
        }

        .floating-card {
            animation: floatCard 5s ease-in-out infinite;
        }

        .bg-pattern {
            background:
                radial-gradient(circle at top right,
                    rgba(200, 169, 107, 0.15),
                    transparent 30%),
                radial-gradient(circle at bottom left,
                    rgba(200, 169, 107, 0.15),
                    transparent 30%),
                #F5F2EB;
        }
    </style>
</head>

<body class="bg-pattern">

    <div class="min-h-screen py-10 md:py-20 flex items-center justify-center px-4">

        <div
            class="floating-card fade-in
            bg-white
            border border-[#E8E2D5]
            rounded-[30px]
            shadow-[0_20px_60px_rgba(0,0,0,0.12)]
            p-8 md:p-10
            w-full
            max-w-[420px]">

            <!-- Logo -->
           <div class="text-center">

    <!-- ICON -->
    <div
        class="w-20 h-20 mx-auto mb-5 rounded-full bg-[#C8A96B]/20 flex items-center justify-center">
        <i class="fa-solid fa-gem text-[#C8A96B] text-2xl"></i>
    </div>

    <!-- LOGO -->
    <a href="../index.html" class="inline-flex items-center justify-center gap-2 text-3xl font-bold">
        VE<span class="text-[#C8A96B]">L</span>ORA
    </a>

    <!-- TAGLINE -->
    <p class="text-gray-500 mt-3 text-sm">
       Create your fashion account 
    </p>

</div>

            <!-- Register Form -->
            <form id="registerForm" class="space-y-4">

                <!-- Name -->
                <div>

                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="registerName"
                        placeholder="Enter your full name"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-[#FAFAFA] focus:outline-none focus:ring-2 focus:ring-[#C8A96B]"
                        required>

                </div>

                <!-- Email -->
                <div>

                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="registerEmail"
                        placeholder="Enter your email"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-[#FAFAFA] focus:outline-none focus:ring-2 focus:ring-[#C8A96B]"
                        required>

                </div>

                <!-- Password -->
                <div>

                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Password
                    </label>

                    <div class="relative">

                        <input
                            type="password"
                            id="registerPassword"
                            placeholder="Create password"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-[#FAFAFA] focus:outline-none focus:ring-2 focus:ring-[#C8A96B]"
                            required>

                        <button
                            type="button"
                            onclick="togglePassword('registerPassword','eye1')"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">

                            <i id="eye1" class="fa-solid fa-eye"></i>

                        </button>

                    </div>

                </div>

                <!-- Confirm Password -->
                <div>

                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Confirm Password
                    </label>

                    <div class="relative">

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm password"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-[#FAFAFA] focus:outline-none focus:ring-2 focus:ring-[#C8A96B]"
                            required>

                        <button
                            type="button"
                            onclick="togglePassword('confirmPassword','eye2')"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">

                            <i id="eye2" class="fa-solid fa-eye"></i>

                        </button>

                    </div>

                </div>

                <!-- Terms -->
                <label class="flex items-start gap-2 text-sm text-gray-600">

                    <input
                        type="checkbox"
                        class="mt-1 accent-[#C8A96B]"
                        required>

                    I agree to the Terms & Conditions

                </label>

                <!-- Register Button -->
                <button
                    type="button"
                    onclick="registerUser()"
                    class="w-full bg-[#1E1A17] text-white py-3 rounded-xl font-semibold hover:bg-[#C8A96B] hover:text-black hover:scale-[1.02] transition-all duration-300">

                    Create Account

                </button>

            </form>

            <!-- Divider -->
            <div class="flex items-center my-6">

                <div class="flex-1 border-t border-gray-200"></div>

                <span class="px-4 text-gray-400 text-sm">
                    OR
                </span>

                <div class="flex-1 border-t border-gray-200"></div>

            </div>

            <!-- Social Register -->
            <div class="grid grid-cols-2 gap-3">

                <button class="border py-3 rounded-xl hover:bg-gray-100 transition">
                    <i class="fa-brands fa-google mr-2"></i>
                    Google
                </button>

                <button class="border py-3 rounded-xl hover:bg-gray-100 transition">
                    <i class="fa-brands fa-facebook-f mr-2"></i>
                    Facebook
                </button>

            </div>

            <!-- Login Link -->
            <p class="text-center text-sm text-gray-500 mt-8">

                Already have an account?

                <a
                    href="./login.html"
                    class="text-[#C8A96B] font-semibold hover:underline">

                    Login

                </a>

            </p>

        </div>

    </div>

    <script>
        function togglePassword(inputId, eyeId) {

            const input = document.getElementById(inputId);
            const eye = document.getElementById(eyeId);

            if (input.type === "password") {
                input.type = "text";
                eye.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                eye.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>

    <script src="../assets/js/auth.js"></script>

</body>

</html>
