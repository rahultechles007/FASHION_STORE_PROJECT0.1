    <!-- PRODUCT SCRIPT -->
     <div id="productDetails"></div>

  <script>

const productId =
localStorage.getItem("selectedProduct");

const products =
JSON.parse(
    localStorage.getItem("products")
) || [];

const product =
products.find(
    p => String(p.id) === String(productId)
);

const container =
document.getElementById(
    "productDetails"
);

if(product){

container.innerHTML = `

<div class="bg-white rounded-3xl shadow-lg overflow-hidden">

    <div class="grid lg:grid-cols-2 gap-10 p-6 lg:p-10">

        <div>

            <div class="aspect-[4/5] overflow-hidden rounded-3xl bg-gray-100">

                <img
                src="${product.image}"
                alt="${product.name}"
                class="w-full h-full object-cover">

            </div>

        </div>

        <div>

            <p class="uppercase tracking-widest text-gray-500">

                ${product.category}

            </p>

            <h1 class="text-4xl lg:text-5xl font-bold mt-3">

                ${product.name}

            </h1>

            <div class="flex items-center gap-2 mt-3">

                <div class="text-[#C8A96B]">

                    ★★★★★

                </div>

                <span class="font-medium">

                    ${product.rating || 4.5}

                </span>

            </div>

            <p class="text-4xl font-bold text-[#C8A96B] mt-6">

                ₹${product.price}

            </p>

            <p class="text-gray-600 leading-8 mt-6">

                ${product.description || "Premium Fashion Collection"}

            </p>

            <div class="flex gap-4 mt-8">

                <button
                onclick="addToCart(${product.id})"
                class="bg-[#1E1A17] text-white px-8 py-4 rounded-xl hover:bg-black transition">

                    <i class="fa-solid fa-cart-shopping mr-2"></i>

                    Add To Cart

                </button>

                <button
                onclick="addToWishlist(${product.id})"
                class="border border-[#C8A96B] text-[#C8A96B] px-8 py-4 rounded-xl hover:bg-[#C8A96B] hover:text-white transition">

                    <i class="fa-regular fa-heart mr-2"></i>

                    Wishlist

                </button>

            </div>

        </div>

    </div>

</div>

`;

}else{

container.innerHTML = `

<div class="text-center py-20">

    <h2 class="text-3xl font-bold">

        Product Not Found

    </h2>

</div>

`;

}

// =====================
// ADD TO CART
// =====================

function addToCart(id){

    let cart =
    JSON.parse(
        localStorage.getItem("cart")
    ) || [];

    let product =
    products.find(
        p => p.id == id
    );

    if(!product) return;

    let existing =
    cart.find(
        item => item.id == id
    );

    if(existing){

        existing.quantity++;

    }else{

        cart.push({

            ...product,
            quantity:1

        });
    }

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    alert("Added To Cart");
}

// =====================
// ADD TO WISHLIST
// =====================

function addToWishlist(id){

    let wishlist =
    JSON.parse(
        localStorage.getItem("wishlist")
    ) || [];

    let product =
    products.find(
        p => p.id == id
    );

    if(!product) return;

    wishlist.push(product);

    localStorage.setItem(
        "wishlist",
        JSON.stringify(wishlist)
    );

    alert("Added To Wishlist");
}

</script>
