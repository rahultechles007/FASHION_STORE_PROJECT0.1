<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | Velora</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="../src/output.css">
</head>

<body class="bg-[#F5F2EB] text-[#1E1A17]">

    <!-- PRODUCT CONTAINER -->
    <div class="max-w-5xl mx-auto px-4 py-10">

        <div id="productDetail" class="bg-white rounded-2xl shadow-md overflow-hidden">

            <!-- PRODUCT WILL LOAD HERE -->

        </div>

    </div>

   <div id="productDetails"></div>

<script>

const product =
JSON.parse(
localStorage.getItem("viewProduct")
);

if(product){

document.getElementById(
"productDetails"
).innerHTML = `

<div class="max-w-5xl mx-auto bg-white rounded-3xl p-8 shadow">

    <div class="grid md:grid-cols-2 gap-8">

        <img
        src="${product.image}"
        class="w-full rounded-2xl">

        <div>

            <p class="text-gray-500">
                ${product.category}
            </p>

            <h1 class="text-4xl font-bold mt-2">
                ${product.name}
            </h1>

            <div class="mt-3">

                <i class="fa-solid fa-star text-[#C8A96B]"></i>

                ${product.rating}

            </div>

            <p class="text-3xl font-bold text-[#C8A96B] mt-4">

                ₹${product.price}

            </p>

            <p class="mt-5 text-gray-600">

                ${product.description}

            </p>

            <button
            onclick="addToCart(
            '${product.name}',
            ${product.price},
            '${product.image}',
            '${product.category}',
            ${product.rating}
            )"
            class="mt-6 bg-[#1E1A17] text-white px-8 py-3 rounded-xl">

                Add To Cart

            </button>

        </div>

    </div>

</div>

`;
}

</script>

</body>

</html>
